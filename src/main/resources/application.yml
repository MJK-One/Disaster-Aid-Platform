config:
  import: classpath:/.env

server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: disaster-alert-service

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  datasource:
    url: ${POSTGRE_URL}
    username: ${POSTGRE_USERNAME}
    password: ${POSTGRE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  hikari:
    maximum-pool-size: 30     # 최대 커넥션 수
    minimum-idle: 10          # 최소 커넥션 수
    idle-timeout: 30000       # 비활성 커넥션 유지 시간 (ms)
    connection-timeout: 20000 # 커넥션을 얻기 위한 최대 대기 시간 (ms)

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        jdbc:
          batch_size: 1000
        order_inserts: true
        order_updates: true
        format_sql: true
        dialect: org.hibernate.spatial.dialect.postgis.PostgisPG10Dialect
    open-in-view: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            scope: profile_nickname, account_email
            client-name: Google

          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            redirect-uri: "http://localhost:8080/api/login/oauth2/code/kakao"
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope:
              - profile_nickname
              - account_email
            client-name: Kakao
            provider: kakao
        provider:
          kakao:
            authorization-uri: ${KAKAO_AUTH_URI}
            token-uri: ${KAKAO_TOKEN_URI}
            user-info-uri: ${KAKAO_USER_INFO_URI}
            user-name-attribute: id
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: localhost:9092

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  main:
    allow-bean-definition-overriding: true

cloud:
  aws:
    s3:
      bucket: b4b4-static-files
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    region:
      static: ap-northeast-2
    stack:
      auto: false

kakao:
  api:
    key: ${KAKAO_API_KEY}

jwt:
  issuer: my-app
  secret: ${JWT_SECRET_KEY}
  access-token-validity: 900000      # 15분
  refresh-token-validity: 1209600000 # 14일

logging:
  level:
    root: INFO
    org.springframework.data.redis: WARN
    org.springframework.kafka: WARN
    org.apache.kafka: WARN

    org.springframework.security : DEBUG
    org.springframework.security.oauth2 : DEBUG
    com.example.emergencyassistb4b4.global.security: DEBUG
    com.example.emergencyassistb4b4: DEBUG
